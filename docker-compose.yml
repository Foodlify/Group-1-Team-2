services:
  node-app: 
    container_name: express-node-app-container
    build: .
    volumes:
      - ./src:/app/src:ro
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://root:example@postgres:5432/mydb
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  postgres:
    image: postgres:15.5-alpine
    container_name: postgres-container
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: example
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: