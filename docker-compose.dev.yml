version: "3.8"
services:
  app:
    build:
      context: .
      target: development
    ports:
      - "3000:3000"
      - "5555:5555"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env  
    environment:
      - NODE_ENV=development